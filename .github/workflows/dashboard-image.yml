name: Build & Push Dashboard Image

on:
  push:
    branches: [master]
    paths:
      - 'ui/**'
      - '!ui/node_modules/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rexx09/musik-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Abhängigkeiten installieren
        run: |
          cd ui
          npm ci --ignore-scripts
          # Workbox-Libraries manuell kopieren (postinstall-Skript funktioniert nur unter Linux/macOS)
          mkdir -p public/3rdparty/workbox
          npx --yes workbox copyLibraries build/3rdparty/ 2>/dev/null || true

      - name: UI bauen
        run: |
          cd ui
          npm run build

      - name: In GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ui/
          file: ui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Musik Dashboard – Navidrome UI Fork